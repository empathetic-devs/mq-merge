name: "Chromatic"

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      project_token:
        description: "Chromatic project token (empty uses secrets.CHROMATIC_PROJECT_TOKEN)"
        required: false
        type: string
      chromatic_index_url:
        description: "Chromatic index URL (empty uses default staging index)"
        required: false
        default: "https://index.staging-chromatic.com"

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
      - name: Install dependencies
        run: npm ci
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ github.event.inputs.project_token || secrets.CHROMATIC_PROJECT_TOKEN }}
          debug: true
        env:
          CHROMATIC_INDEX_URL: ${{ github.event.inputs.chromatic_index_url || 'https://index.staging-chromatic.com' }}
